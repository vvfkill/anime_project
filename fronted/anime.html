<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeTrack — Аниме</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="page-shell">
        <header class="header glass">
            <div class="logo">Anime<span>Track</span></div>

            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="#">Каталог</a>
                <a href="#">Список</a>
                <a href="#">Закладки</a>
                <a href="#">Отзывы</a>
            </nav>

            <button type="button" class="profile-btn glass">
                <span class="profile-icon">◉</span>
                <span>Профиль</span>
            </button>
        </header>

        <div class="search-row">
            <div class="search-box glass">
                <input type="text" placeholder="Поиск аниме..." />
                <button>Найти</button>
            </div>
        </div>

        <main class="main-content">
            <section id="animeDetails" class="anime-page-top glass">
                <p>Загрузка...</p>
            </section>

            <section class="anime-page-bottom">
                <div class="anime-tabs glass">
                    <div class="tabs-row">
                        <button class="tab-btn active">Описание</button>
                        <button class="tab-btn">Персонажи</button>
                        <button class="tab-btn">Отзывы</button>
                        <button class="tab-btn">Похожее</button>
                    </div>

                    <div class="reviews-header">
                        <h2>Отзывы пользователей</h2>
                        <button class="primary-btn">Написать отзыв</button>
                    </div>

                    <div id="reviewsContainer" class="reviews-list">
                        <p>Загрузка отзывов...</p>
                    </div>
                </div>

                <aside class="rating-panel glass">
                    <h3>Рейтинг пользователей</h3>
                    <div id="ratingValue" class="big-rating">—</div>
                    <div class="stars">★★★★★</div>
                    <p id="ratingSubtext">Средняя оценка</p>
                </aside>
            </section>
        </main>
    </div>

    <script src="anime.js"></script>
</body>
</html>
