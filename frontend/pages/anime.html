<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeTrack — Аниме</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <div class="page-shell">
        <div id="siteHeader"></div>

        <main class="main-content">
            <section id="animeDetails" class="anime-page-top glass">
                <p>Загрузка...</p>
            </section>

            <section class="anime-page-bottom">
                <div class="anime-tabs glass">
                    <div class="tabs-row">
                        <button type="button" class="tab-btn active">Описание</button>
                        <button type="button" class="tab-btn">Персонажи</button>
                        <button type="button" class="tab-btn">Отзывы</button>
                        <button type="button" class="tab-btn">Похожее</button>
                    </div>

                    <div class="reviews-header">
                        <h2>Отзывы пользователей</h2>
                        <button type="button" class="primary-btn">Написать отзыв</button>
                    </div>

                    <div id="reviewsContainer" class="reviews-list">
                        <p>Загрузка отзывов...</p>
                    </div>
                </div>

                <aside class="rating-panel glass">
                    <h3>Рейтинг пользователей</h3>
                    <div id="ratingValue" class="big-rating">—</div>
                    <div class="stars">★★★★★</div>
                    <p id="ratingSubtext">Средняя оценка</p>
                </aside>
            </section>
        </main>
    </div>

    <script src="../js/header.js"></script>
    <script src="../js/anime.js"></script>
</body>
</html>
