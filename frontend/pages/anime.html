<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeTrack — Аниме</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <div class="page-shell">
        <div id="siteHeader"></div>

        <main class="anime-main">
            <section id="animeDetails" class="anime-hero-card glass">
                <p>Загрузка...</p>
            </section>

            <section class="anime-bottom-layout">
                <div class="anime-tabs-card glass">
                    <div class="tabs-row">
                        <button type="button" class="tab-btn active" data-tab="description">Описание</button>
                        <button type="button" class="tab-btn" data-tab="characters">Персонажи</button>
                        <button type="button" class="tab-btn" data-tab="reviews">Отзывы</button>
                        <button type="button" class="tab-btn" data-tab="similar">Похожее</button>
                    </div>

                    <div class="tab-content active" id="descriptionTab">
                        <h2>Описание</h2>
                        <div id="descriptionContainer">
                            <p>Загрузка описания...</p>
                        </div>
                    </div>

                    <div class="tab-content" id="charactersTab">
                        <h2>Персонажи</h2>

                        <div id="charactersContainer" class="characters-grid">
                            <p>Загрузка персонажей...</p>
                        </div>
                    </div>

                    <div class="tab-content" id="reviewsTab">
                        <div class="reviews-header">
                            <h2>Отзывы пользователей</h2>

                            <div class="reviews-actions">
                                <select class="review-sort-select">
                                    <option>Популярные</option>
                                    <option>Новые</option>
                                    <option>Высокая оценка</option>
                                </select>

                                <button type="button" class="primary-btn" id="writeReviewBtn">
                                    Написать отзыв
                                </button>
                            </div>
                        </div>

                        <div id="reviewsContainer" class="reviews-list">
                            <p>Загрузка отзывов...</p>
                        </div>
                    </div>

                    <div class="tab-content" id="similarTab">
                        <h2>Похожее аниме</h2>
                        <div id="similarAnimeContainer" class="similar-anime-grid">
                            <p>Похожие аниме пока не добавлены.</p>
                        </div>
                    </div>
                </div>

                <aside class="rating-panel glass">
                    <h3>Рейтинг пользователей</h3>
                    <div id="ratingValue" class="big-rating">—</div>
                    <div class="stars">★★★★★</div>
                    <p id="ratingSubtext">Средняя оценка</p>

                    <div class="rating-bars">
                        <div><span>5 ★</span><progress value="78" max="100"></progress><span>78%</span></div>
                        <div><span>4 ★</span><progress value="15" max="100"></progress><span>15%</span></div>
                        <div><span>3 ★</span><progress value="5" max="100"></progress><span>5%</span></div>
                        <div><span>2 ★</span><progress value="1" max="100"></progress><span>1%</span></div>
                        <div><span>1 ★</span><progress value="1" max="100"></progress><span>1%</span></div>
                    </div>
                </aside>
            </section>
        </main>
    </div>

    <script src="../js/header.js"></script>
    <script src="../js/anime.js"></script>
</body>
</html>
