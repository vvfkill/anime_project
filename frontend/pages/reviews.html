<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeTrack — Отзывы</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="reviews-page">
    <div class="page-shell">
        <header class="header glass">
            <div class="logo">Anime<span>Track</span></div>

            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="list.html">Список</a>
                <a href="bookmarks.html">Закладки</a>
                <a href="reviews.html" class="active">Отзывы</a>
            </nav>

            <button type="button" class="profile-btn glass">
                <span class="profile-icon">◉</span>
                <span>Профиль</span>
            </button>
        </header>

        <main class="reviews-layout">
            <aside class="filters-panel glass">
                <h2>Фильтры</h2>

                <div class="filter-group">
                    <div class="filter-title-row">
                        <h3>Тип</h3>
                        <span class="filter-arrow">⌃</span>
                    </div>

                    <label class="filter-check">
                        <input type="checkbox" name="reviewType" value="TV Сериал" checked>
                        <span>TV Сериал</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="reviewType" value="Фильм">
                        <span>Фильм</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="reviewType" value="OVA">
                        <span>OVA</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="reviewType" value="ONA">
                        <span>ONA</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="reviewType" value="Спешл">
                        <span>Спешл</span>
                    </label>
                </div>

                <div class="filter-group">
                    <div class="filter-title-row">
                        <h3>Жанры</h3>
                        <span class="filter-arrow">⌃</span>
                    </div>

                    <label class="filter-check">
                        <input type="checkbox" name="reviewGenre" value="Экшен">
                        <span>Экшен</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="reviewGenre" value="Приключения">
                        <span>Приключения</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="reviewGenre" value="Комедия">
                        <span>Комедия</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="reviewGenre" value="Драма">
                        <span>Драма</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="reviewGenre" value="Фэнтези">
                        <span>Фэнтези</span>
                    </label>
                </div>

                <div class="filter-group">
                    <h3>Год выпуска</h3>

                    <div class="year-filter-row">
                        <input id="reviewYearFromInput" type="number" value="1950" min="1950" max="2026">
                        <span>—</span>
                        <input id="reviewYearToInput" type="number" value="2026" min="1950" max="2026">
                    </div>
                </div>

                <div class="filter-group">
                    <h3>Оценка отзыва</h3>

                    <div class="rating-filter-grid">
                        <button type="button" class="filter-chip" data-rating="9">★ 9 и выше</button>
                        <button type="button" class="filter-chip" data-rating="8">★ 8 и выше</button>
                        <button type="button" class="filter-chip" data-rating="7">★ 7 и выше</button>
                        <button type="button" class="filter-chip" data-rating="6">★ 6 и выше</button>
                    </div>
                </div>

                <button type="button" id="applyReviewFiltersBtn" class="primary-btn wide-btn">
                    Применить фильтры
                </button>

                <button type="button" id="resetReviewFiltersBtn" class="secondary-btn wide-btn">
                    Сбросить все
                </button>
            </aside>

            <section class="reviews-content">
                <div class="reviews-head">
                    <div>
                        <h1>Отзывы пользователей</h1>
                        <p id="reviewsCount">Загрузка...</p>
                    </div>

                    <div class="sort-box glass">
                        <span>Сортировать:</span>
                        <select id="reviewsSortSelect">
                            <option value="date">Новые сначала</option>
                            <option value="score">По оценке</option>
                            <option value="title">По названию</option>
                        </select>
                    </div>
                </div>

                <div id="reviewsList" class="reviews-feed">
                    <p>Загрузка отзывов...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/reviews.js"></script>
</body>
</html>
