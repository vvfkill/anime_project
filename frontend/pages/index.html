<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeTrack</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <div class="page-shell">
        <div id="siteHeader"></div>

        <main class="main-content">
            <section class="hero glass">
                <div class="hero-text">
                    <div class="hero-label">СЛЕДИ. СМОТРИ. ОЦЕНИВАЙ.</div>
                    <h1>Ваш личный мир аниме</h1>
                    <p>
                        Отслеживайте просмотренное, ищите новое
                        и делитесь впечатлениями с другими.
                    </p>

                    <div class="hero-actions">
                        <a class="primary-btn" href="catalog.html">Смотреть каталог</a>
                        <a class="secondary-btn" href="list.html">Мой список</a>
                    </div>
                </div>
            </section>

            <section class="content-section">
                <div class="section-head">
                    <h2>Популярное аниме</h2>
                    <button class="see-all-btn" type="button">Смотреть все</button>
                </div>

                <div class="slider-wrapper">
                    <div id="popularAnime" class="anime-row"></div>
                </div>
            </section>

            <section class="content-section">
                <div class="section-head">
                    <h2>Новинки сезона</h2>
                    <button class="see-all-btn" type="button">Смотреть все</button>
                </div>

                <div class="slider-wrapper">
                    <div id="newAnime" class="anime-row"></div>
                </div>
            </section>
        </main>

        <footer class="footer glass">
            <div class="footer-brand">
                <div class="logo">Anime<span>Track</span></div>
                <p>© 2026 Все права защищены</p>
            </div>

            <div class="footer-links">
                <a href="#">О проекте</a>
                <a href="#">Правила</a>
                <a href="#">Контакты</a>
            </div>
        </footer>
    </div>

    <script src="../js/header.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
