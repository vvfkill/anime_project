<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeTrack — Каталог</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="catalog-page">
    <div class="page-shell">
        <header class="header glass">
            <div class="logo">Anime<span>Track</span></div>

            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="catalog.html" class="active">Каталог</a>
                <a href="list.html">Список</a>
                <a href="bookmarks.html">Закладки</a>
                <a href="#">Отзывы</a>
            </nav>

            <button type="button" class="profile-btn glass">
                <span class="profile-icon">◉</span>
                <span>Профиль</span>
            </button>
        </header>

        <main class="catalog-layout">
            <aside class="filters-panel glass">
                <h2>Фильтры</h2>

                <div class="filter-group">
                    <div class="filter-title-row">
                        <h3>Тип</h3>
                
                    </div>

                    <label class="filter-check">
                        <input type="checkbox" name="catalogType" value="TV Сериал" checked>
                        <span>TV Сериал</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="catalogType" value="Фильм">
                        <span>Фильм</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="catalogType" value="OVA">
                        <span>OVA</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="catalogType" value="ONA">
                        <span>ONA</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="catalogType" value="Спешл">
                        <span>Спешл</span>
                    </label>
                </div>

                <div class="filter-group">
                    <div class="filter-title-row">
                        <h3>Жанры</h3>
                
                    </div>

                    <label class="filter-check">
                        <input type="checkbox" name="catalogGenre" value="Экшен">
                        <span>Экшен</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="catalogGenre" value="Приключения">
                        <span>Приключения</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="catalogGenre" value="Комедия">
                        <span>Комедия</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="catalogGenre" value="Драма">
                        <span>Драма</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="catalogGenre" value="Фэнтези">
                        <span>Фэнтези</span>
                    </label>
                </div>

                <div class="filter-group">
                    <h3>Год выпуска</h3>

                    <div class="year-filter-row">
                        <input id="catalogYearFromInput" type="number" value="1950" min="1950" max="2026">
                        <span>—</span>
                        <input id="catalogYearToInput" type="number" value="2026" min="1950" max="2026">
                    </div>
                </div>

                <div class="filter-group">
                    <h3>Рейтинг</h3>

                    <div class="rating-filter-grid">
                        <button type="button" class="filter-chip" data-rating="9">★ 9 и выше</button>
                        <button type="button" class="filter-chip" data-rating="8">★ 8 и выше</button>
                        <button type="button" class="filter-chip" data-rating="7">★ 7 и выше</button>
                        <button type="button" class="filter-chip" data-rating="6">★ 6 и выше</button>
                    </div>
                </div>

                <button id="applyCatalogFiltersBtn" type="button" class="primary-btn wide-btn">
                    Применить фильтры
                </button>

                <button id="resetCatalogFiltersBtn" type="button" class="secondary-btn wide-btn">
                    Сбросить все
                </button>
            </aside>   
            

            <section class="catalog-content">
                <div class="catalog-head">
                    <div>
                        <h1>Каталог аниме</h1>
                        <p id="catalogCount">Загрузка...</p>
                    </div>

                    <div class="sort-box glass">
                        <span>Сортировать:</span>
                        <select id="catalogSortSelect">
                            <option value="default">По умолчанию</option>
                            <option value="rating">По рейтингу</option>
                            <option value="title">По названию</option>
                        </select>
                    </div>
                </div>

                <div id="catalogGrid" class="catalog-grid">
                    <p>Загрузка каталога...</p>
                </div>

                <div class="catalog-pagination">
                    <button id="prevPageBtn" type="button" class="secondary-btn">Назад</button>
                    <span id="pageInfo">Страница 1</span>
                    <button id="nextPageBtn" type="button" class="secondary-btn">Вперёд</button>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/catalog.js"></script>
</body>
</html>
