<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeTrack — Мой список</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="list-page">
    <div class="page-shell">
        <header class="header glass">
            <div class="logo">Anime<span>Track</span></div>

            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="list.html" class="active">Список</a>
                <a href="bookmarks.html">Закладки</a>
                <a href="reviews.html">Отзывы</a>
            </nav>

            <button type="button" class="profile-btn glass">
                <span class="profile-icon">◉</span>
                <span>Профиль</span>
            </button>
        </header>

        <main class="tracking-layout">
            <aside class="filters-panel glass">
                <h2>Фильтры</h2>

                <div class="filter-group">
                    <div class="filter-title-row">
                        <h3>Тип</h3>
                        
                    </div>

                    <label class="filter-check">
                        <input type="checkbox" name="listType" value="TV Сериал" checked>
                        <span>TV Сериал</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="listType" value="Фильм">
                        <span>Фильм</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="listType" value="OVA">
                        <span>OVA</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="listType" value="ONA">
                        <span>ONA</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="listType" value="Спешл">
                        <span>Спешл</span>
                    </label>
                </div>

                <div class="filter-group">
                    <div class="filter-title-row">
                        <h3>Жанры</h3>
                        
                    </div>

                    <label class="filter-check">
                        <input type="checkbox" name="listGenre" value="Экшен">
                        <span>Экшен</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="listGenre" value="Приключения">
                        <span>Приключения</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="listGenre" value="Комедия">
                        <span>Комедия</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="listGenre" value="Драма">
                        <span>Драма</span>
                    </label>

                    <label class="filter-check">
                        <input type="checkbox" name="listGenre" value="Фэнтези">
                        <span>Фэнтези</span>
                    </label>
                </div>

                <div class="filter-group">
                    <h3>Год выпуска</h3>

                    <div class="year-filter-row">
                        <input id="listYearFromInput" type="number" value="1950" min="1950" max="2026">
                        <span>—</span>
                        <input id="listYearToInput" type="number" value="2026" min="1950" max="2026">
                    </div>
                </div>

                <div class="filter-group">
                    <h3>Рейтинг</h3>

                    <div class="rating-filter-grid">
                        <button type="button" class="filter-chip" data-rating="9">★ 9 и выше</button>
                        <button type="button" class="filter-chip" data-rating="8">★ 8 и выше</button>
                        <button type="button" class="filter-chip" data-rating="7">★ 7 и выше</button>
                        <button type="button" class="filter-chip" data-rating="6">★ 6 и выше</button>
                    </div>
                </div>

                <button type="button" id="applyListFiltersBtn" class="primary-btn wide-btn">
                    Применить фильтры
                </button>

                <button type="button" id="resetListFiltersBtn" class="secondary-btn wide-btn">
                    Сбросить все
                </button>
            </aside>

            <section class="tracking-content">
                <div class="tracking-head">
                    <div>
                        <h1>Мой список</h1>
                        <p id="listCount">Загрузка списка...</p>
                    </div>

                    <div class="tracking-user-mini glass">
                        <div id="listAvatar" class="tracking-avatar">A</div>
                        <div>
                            <strong id="listUserName">Пользователь</strong>
                            <span id="listUserSubtext">Личный трекер просмотра</span>
                        </div>
                    </div>
                </div>

                <div class="tracking-summary">
                    <article class="summary-card summary-total glass">
                        <span>Всего</span>
                        <strong id="totalCount">0</strong>
                        <p>аниме в списке</p>
                    </article>

                    <article class="summary-card summary-watching glass">
                        <span>Смотрю</span>
                        <strong id="watchingCount">0</strong>
                        <p>аниме</p>
                    </article>

                    <article class="summary-card summary-planned glass">
                        <span>Запланировано</span>
                        <strong id="plannedCount">0</strong>
                        <p>аниме</p>
                    </article>

                    <article class="summary-card summary-completed glass">
                        <span>Просмотрено</span>
                        <strong id="completedCount">0</strong>
                        <p>аниме</p>
                    </article>

                    <article class="summary-card summary-dropped glass">
                        <span>Брошено</span>
                        <strong id="droppedCount">0</strong>
                        <p>аниме</p>
                    </article>
                </div>

                <div class="tracking-tabs">
                    <button type="button" class="tracking-tab active" data-status="all">Все</button>
                    <button type="button" class="tracking-tab" data-status="Смотрю">Смотрю</button>
                    <button type="button" class="tracking-tab" data-status="Запланировано">Запланировано</button>
                    <button type="button" class="tracking-tab" data-status="Просмотрено">Просмотрено</button>
                    <button type="button" class="tracking-tab" data-status="Брошено">Брошено</button>
                </div>

                <div id="userListGrid" class="tracking-list">
                    <p>Загрузка...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/list.js"></script>
</body>
</html>
